name: Deploy flasher (Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Mirror release firmware for flasher
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MAX_RELEASES: 8
        run: python3 scripts/sync-flasher-releases.py

      - name: Stamp cache-busting build version
        run: |
          BUILT_AT="$(date -u '+%Y-%m-%d %H:%M UTC')"
          sed -i "s/__BUILD__/${GITHUB_SHA}/g; s|__BUILT_AT__|${BUILT_AT}|g" \
            flasher/index.html flasher/app.js

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: flasher

      - id: deployment
        uses: actions/deploy-pages@v5
