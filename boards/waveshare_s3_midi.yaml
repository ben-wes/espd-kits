id: waveshare_s3_midi
name: Waveshare ESP32-S3-AUDIO (USB MIDI)
target: esp32s3
help: |
  Waveshare ESP32-S3-AUDIO with TinyUSB OTG: CDC serial console, dev sync over
  CDC, USB mass storage, and USB MIDI (device/host via config.txt usb_midi_role).
  Same hardware as waveshare_s3; use waveshare_s3 for USB Serial JTAG + serial sync.

bsp:
  component: waveshare_esp32_s3_audio
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/waveshare_esp32_s3_audio
  version: espd-bsp

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI
    - ESPD_USE_USB_OTG

io:
  buttons: [VOLUP, PLAY, VOLDOWN]

profile:
  USB OTG + MIDI:
    ESPD_USE_USB_OTG: y
    ESPD_USE_USB_MSC: y
    ESPD_USE_USB_MIDI: y
    ESPD_USE_USB_MIDI_HOST: y
    TINYUSB_MSC_ENABLED: y
    TINYUSB_CDC_ENABLED: y
    ESPD_DEV_SYNC: y
    ESPD_DEV_CDC_SYNC: y
    ESP_CONSOLE_NONE: y
