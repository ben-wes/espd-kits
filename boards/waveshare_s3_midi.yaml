id: waveshare_s3_midi
name: Waveshare ESP32-S3-AUDIO (USB MIDI)
target: esp32s3
help: |
  Waveshare ESP32-S3-AUDIO with TinyUSB OTG: CDC serial, dev sync, USB mass
  storage, and USB MIDI (usb_midi_role in config.txt).
  CDC port (macOS): cu.usbmodem0000000000011 when usb_midi_role=device (default
  for MIDI); cu.usbmodem1234561 when usb_midi_role=off (auto descriptor only).
  Do not use cu.usbmodem*101 — that is USB Serial JTAG, disabled on this board.
  For USB Serial JTAG dev sync (no OTG/MIDI), use waveshare_s3.

bsp:
  component: waveshare_esp32_s3_audio
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/waveshare_esp32_s3_audio
  version: espd-bsp

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI
    - ESPD_USE_USB_OTG

io:
  buttons: [VOLUP, PLAY, VOLDOWN]

profile:
  USB OTG + MIDI:
    ESPD_USE_USB_OTG: y
    ESPD_USE_USB_MSC: y
    ESPD_USE_USB_MIDI: y
    ESPD_USE_USB_MIDI_HOST: n
    TINYUSB_MSC_ENABLED: y
    TINYUSB_CDC_ENABLED: y
    TINYUSB_MIDI_COUNT: 1
    ESPD_DEV_SYNC: y
    ESPD_DEV_CDC_SYNC: y
    ESP_CONSOLE_NONE: y
    USJ_ENABLE_USB_SERIAL_JTAG: n
