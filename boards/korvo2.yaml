id: korvo2
name: ESP32-S3-Korvo-2
note: mic array, LCD
target: esp32s3
help: |
  Espressif ESP32-S3-Korvo-2 multimedia board (ES7210 mic array,
  ES8311 speaker, microSD, LCD, TCA9554 IO expander).

bsp:
  component: esp32_s3_korvo_2
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/esp32_s3_korvo_2
  version: espd-bsp
  no_ws2812_leds: true

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT

io:
  buttons: [REC, MUTE, PLAY, SET, VOLDOWN, VOLUP]

profile:
  display:
    BSP_CONFIG_NO_GRAPHIC_LIB: 1
  storage:
    # SD cards use 512-byte sectors; chip-wide FATFS 4096 breaks SD mount.
    FATFS_SECTOR_512: y
