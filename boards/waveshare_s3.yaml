id: waveshare_s3
name: Waveshare ESP32-S3-AUDIO
target: esp32s3
help: |
  Waveshare ESP32-S3-AUDIO (ES8311 codec, ES7210 mic): TinyUSB OTG CDC for
  serial monitor and dev sync (espd_sync). No USB MIDI — use waveshare_s3_midi
  for USB MIDI.
  CDC port (macOS): cu.usbmodem0000000000011 — not cu.usbmodem*101 (USB Serial
  JTAG is disabled on this profile).

bsp:
  component: waveshare_esp32_s3_audio
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/waveshare_esp32_s3_audio
  version: espd-bsp

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI
    - ESPD_USE_USB_OTG

io:
  buttons: [VOLUP, PLAY, VOLDOWN]
