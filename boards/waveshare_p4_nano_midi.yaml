id: waveshare_p4_nano_midi
name: Waveshare ESP32-P4-NANO (USB MIDI)
target: esp32p4
help: |
  Waveshare ESP32-P4-NANO with TinyUSB OTG: CDC serial console, dev sync over
  CDC, USB mass storage, and USB MIDI (device/host via config.txt usb_midi_role).
  Same hardware as waveshare_p4_nano; use that board for CH343 UART + serial sync.

bsp:
  component: esp32_p4_nano
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/esp32_p4_nano
  version: espd-bsp

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI
    - ESPD_USE_USB_OTG

profile:
  USB OTG + MIDI:
    ESPD_USE_USB_OTG: y
    ESPD_USE_USB_MSC: y
    ESPD_USE_USB_MIDI: y
    ESPD_USE_USB_MIDI_HOST: y
    TINYUSB_MSC_ENABLED: y
    TINYUSB_CDC_ENABLED: y
    TINYUSB_MIDI_COUNT: 1
    TINYUSB_MSC_BUFSIZE: 8192
    WL_SECTOR_SIZE_4096: y
    ESPD_DEV_SYNC: y
    ESPD_DEV_CDC_SYNC: y
    ESP_CONSOLE_NONE: y
    USJ_ENABLE_USB_SERIAL_JTAG: n
  Board hardware:
    BSP_CONFIG_NO_GRAPHIC_LIB: 1
    ESPTOOLPY_FLASHSIZE_16MB: y
    SPIRAM: y
    SPIRAM_MODE_HEX: y
    SPIRAM_SPEED_200M: y
    SPIRAM_BOOT_INIT: y
    SPIRAM_USE_MALLOC: y
    SPIRAM_TRY_ALLOCATE_WIFI_LWIP: y
    SPIRAM_MALLOC_ALWAYSINTERNAL: 16384
    SPIRAM_MALLOC_RESERVE_INTERNAL: 32768
    CODEC_ES8311_SUPPORT: y
    BSP_SD_MOUNT_POINT: '"/sdcard"'
    CONFIG_BSP_LCD_TYPE_480_640_2_8_INCH: n
    CONFIG_BSP_LCD_TYPE_800_800_3_4_INCH_C: n
    CONFIG_BSP_LCD_TYPE_720_720_4_INCH_C: n
    CONFIG_BSP_LCD_TYPE_480_800_4_INCH: n
    CONFIG_BSP_LCD_TYPE_720_1280_5_INCH_D: n
    CONFIG_BSP_LCD_TYPE_720_1560_6_25_INCH: n
    CONFIG_BSP_LCD_TYPE_1024_600_5_INCH_C: n
    CONFIG_BSP_LCD_TYPE_1024_600_7_INCH_C: n
    CONFIG_BSP_LCD_TYPE_400_1280_7_9_INCH: n
    CONFIG_BSP_LCD_TYPE_1280_800_7_INCH_E: n
    CONFIG_BSP_LCD_TYPE_1280_800_8_INCH_C: n
    CONFIG_BSP_LCD_TYPE_1280_800_10_1_INCH_C: n
    CONFIG_BSP_LCD_TYPE_480_1920_8_8_INCH: n
    CONFIG_BSP_LCD_TYPE_320_1480_11_9_INCH: n
    CONFIG_BSP_LCD_TYPE_800_1280_10_1_INCH: n
    CONFIG_BSP_LCD_TYPE_800_1280_10_1_INCH_A: n
    CONFIG_BSP_LCD_TYPE_800_1280_8_INCH_A: n
    CONFIG_BSP_LCD_TYPE_720_1280_7_INCH_A: n
    CONFIG_BSP_LCD_TYPE_720_1280_5_INCH_A: n
    CONFIG_BSP_LCD_TYPE_720_1280_10_1_INCH_B: n
    CONFIG_BSP_LCD_TYPE_720_1280_9_INCH_B: n
    CONFIG_LV_CONF_SKIP: y
    FATFS_SECTOR_512: y
    FATFS_LFN_HEAP: y
  ESP-Hosted (C6 SDIO):
    CONFIG_SLAVE_IDF_TARGET_ESP32C6: y
    CONFIG_ESP_HOSTED_CP_TARGET_ESP32C6: y
    CONFIG_ESP_HOSTED_P4_DEV_BOARD_FUNC_BOARD: y
    CONFIG_ESP_HOSTED_SDIO_OPTIMIZATION_RX_STREAMING_MODE: y
    CONFIG_ESP_HOSTED_SD_PWR_CTRL_LDO_INTERNAL_IO: n
  Pd runtime tuning:
    ESP_MAIN_TASK_AFFINITY_CPU1: y
    ESP_MAIN_TASK_AFFINITY: "0x1"
    LWIP_TCPIP_TASK_AFFINITY_CPU0: y
    LWIP_TCPIP_TASK_AFFINITY: "0x0"
    ESP_TIMER_TASK_AFFINITY_CPU0: y
    ESP_TIMER_TASK_AFFINITY: "0x0"
    PTHREAD_TASK_STACK_SIZE_DEFAULT: 8192
    PTHREAD_TASK_PRIO_DEFAULT: 5
    PTHREAD_TASK_CORE_DEFAULT: 0
    LWIP_MAX_SOCKETS: 8
    LWIP_TCP_SND_BUF_DEFAULT: 16384
    LWIP_TCP_WND_DEFAULT: 16384
    LWIP_TCP_RECVMBOX_SIZE: 32
    LWIP_UDP_RECVMBOX_SIZE: 32
    LWIP_TCPIP_RECVMBOX_SIZE: 32
    LWIP_TCP_SACK_OUT: y
