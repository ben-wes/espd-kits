id: waveshare_s3_ap
name: Waveshare ESP32-S3-AUDIO (SoftAP sync)
target: esp32s3
help: |
  Waveshare ESP32-S3-AUDIO — SoftAP patch-sync dev profile (battery-friendly:
  no USB OTG, no USB MIDI). Same ES8311 / ES7210 / SD as waveshare_s3. Flash
  over USB Serial JTAG when cabled. Day-to-day: join the device SoftAP and open
  https://192.168.4.1 for monitor + live folder sync (accept the self-signed
  warning once). Patch sync via espd_sync.py or USB Serial JTAG. STA still works via config.txt wifi_ssid=
  for patches that
  use [netsend] / [netreceive].

bsp:
  component: waveshare_esp32_s3_audio
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/waveshare_esp32_s3_audio
  version: espd-bsp

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI

io:
  buttons: [VOLUP, PLAY, VOLDOWN]

profile:
  SoftAP sync dev:
    ESPD_ENABLE_LEGACY_WIFI_TRANSPORT: n
    ESPD_DEV_SYNC: y
    ESPD_DEV_SERIAL_SYNC: y
    ESPD_WIFI_AP_SYNC: y
    MBEDTLS_TLS_SERVER_AND_CLIENT: y
    MBEDTLS_SSL_KEEP_PEER_CERTIFICATE: y
    MBEDTLS_DYNAMIC_BUFFER: y
    MBEDTLS_DYNAMIC_FREE_CONFIG_DATA: y
    ESP_TLS_USE_DS_PERIPHERAL: n
    SPIRAM_MALLOC_RESERVE_INTERNAL: 131072

flasher:
  image: assets/boards/waveshare_s3.jpg
  title: Waveshare S3 Audio · SoftAP
  note: wireless patch sync
