id: waveshare_p4_nano
name: Waveshare ESP32-P4-NANO
note: UART sync
target: esp32p4
help: |
  Waveshare ESP32-P4-NANO (ES8311 codec, microSD). Onboard ESP32-C6-MINI provides
  Wi-Fi 6 / BLE over SDIO (ESP-Hosted). STA uses wifi_ssid= in config.txt (same
  as S3). BSP from ben-wes/esp-bsp (IDF 6); hosted Wi-Fi deps in esp32_p4_nano BSP.
  Type-C is CH343 USB-UART — dev sync uses UART0 serial sync (no OTG / USB MIDI).
  For TinyUSB OTG CDC + USB MIDI, use waveshare_p4_nano_midi (Type-A OTG; Type-C stays CH343 UART).

bsp:
  component: esp32_p4_nano
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/esp32_p4_nano
  version: espd-bsp

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI
    - ESPD_DEV_SYNC
